services:
    db:
        image: postgres:13
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-household_db}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: always
        volumes:
            - postgres_data:/var/lib/postgresql/data/
        environment:
            - POSTGRES_USER=${DB_USER:-user}
            - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
            - POSTGRES_DB=${DB_NAME:-household_db}
        ports:
            - "5432:5432"
volumes:
    postgres_data:
