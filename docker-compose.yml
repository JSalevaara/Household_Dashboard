services:
    db:
        image: postgres:13
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-household_db}" ]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: always
        volumes:
            - postgres_data:/var/lib/postgresql/data/
        environment:
            - POSTGRES_USER=${DB_USER:-user}
            - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
            - POSTGRES_DB=${DB_NAME:-household_db}
        ports:
            - "${DB_LOCAL_PORT:-5432}:5432"
    backend:
        build: ./backend
        ports:
            - "8080:8000"
        env_file:
            - .env
        environment:
            - DB_HOST=db
            - DB_PORT=5432
        volumes:
            - ./backend:/app
        depends_on:
            db:
                condition: service_healthy
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
    postgres_data:
