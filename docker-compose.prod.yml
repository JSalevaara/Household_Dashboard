services:
  backend:
    restart: always
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "9000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  db-backup:
    image: postgres:13
    restart: always
    env_file:
      - .env
    environment:
      - PGPASSWORD=${DB_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /var/opt/dashboard_backups:/backups
    command: >
      sh -c " echo 'Backup service started.'; while true; do
        filename=/backups/dump_$$(date +%Y-%m-%d_%H-%M-%S).sql;
        echo \"Running backup to $$filename...\";
        pg_dump -h db -U ${DB_USER:-user} ${DB_NAME:-household_db} > $$filename;
        echo 'Backup completed. Sleeping for 24 hours...';
        sleep 86400;
      done "
