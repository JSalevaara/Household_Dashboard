services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "9000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  db-backup:
    image: postgres:15
    restart: always
    env_file:
      - .env
    environment:
      - PGPASSWORD=${DB_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /var/opt/dashboard_backups:/backups
    command: >
      sh -c "
        echo 'Backup service started.';
        while true; do
          # 2. Added .gz extension
          filename=/backups/dump_$$(date +%Y-%m-%d_%H-%M-%S).sql.gz;
          echo \"Running backup to $$filename...\";
          
          # 3. Piped pg_dump output into gzip
          pg_dump -h db -U ${DB_USER:-user} ${DB_NAME:-household_db} | gzip > $$filename;
          
          # 4. Find and delete files older than 7 days (+7)
          echo 'Backup completed. Cleaning up backups older than 7 days...';
          find /backups -type f -name '*.sql.gz' -mtime +7 -delete;
          
          echo 'Cleanup done. Sleeping for 24 hours...';
          sleep 86400;
        done
      "
