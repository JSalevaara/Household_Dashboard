name: Deploy to Home Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate .env file
        run: |
          cat << 'EOF' > .env
          ${{secrets.ENV_FILE_CONTENTS}}
          EOF
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry & Dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          cd backend
          poetry install  # This installs pytest because we removed --only main

      - name: Run Backend Tests
        run: cd backend && poetry run pytest tests --suppress-no-tests-exit-code

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm install
          npm test

      - name: Run frontend tests
        run: |
          cd frontend
          npm install
          npm test

      - name: Start and Update Containers
        run: make prod

      - name: Run Database Migrations
        run: |
          make migrate
          make init-db

      - name: Restart Nginx
        run: make reload-nginx

      - name: Fix Permissions
        run: make fix-perms
        if: always()

      - name: Clean up old Docker resources
        run: make clean
        if: always()
