name: CI/CD Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run tests
        working-directory: ./frontend
        run: npm run test

  test-backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:13
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: pip install poetry
      - name: Generate Fresh Lockfile
        working-directory: ./backend
        run: poetry lock
      - name: Install dependencies
        working-directory: ./backend
        run: poetry install --with dev
      - name: Run Pytest
        working-directory: ./backend
        env:
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: test_db
          DB_HOST: localhost
          DB_PORT: 5432
        run: poetry run pytest

  deploy:
    needs: [test-frontend, test-backend]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate .env file
        run: |
          cat << 'EOF' > .env
          ${{secrets.ENV_FILE_CONTENTS}}
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Start and Update Containers
        run: make prod

      - name: Run Database Migrations
        run: |
          make migrate
          make init-db

      - name: Restart Nginx
        run: make reload-nginx

      - name: Fix Permissions
        if: always()
        run: make fix-perms

      - name: Clean up old Docker resources
        if: always()
        run: make clean
