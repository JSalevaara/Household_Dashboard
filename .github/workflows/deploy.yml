name: Deploy to Home Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Generate .env file
        run: |
          echo "${{secrets.ENV_FILE_CONTENTS}}" > .env
      - name: Deploy Production Stack
        run: |
          make prod
          make migrate
          make restart-nginx
          make clean
